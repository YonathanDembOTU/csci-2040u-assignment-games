<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Game Catalogue</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <h1>Game Catalogue</h1>
    <div class="user-info">
        <span id="userInfo"></span>
        <a href="#" id="logoutBtn" style="color: #ff4757; margin-left: 15px; text-decoration: none; font-weight: bold; font-size: 12px;">Logout</a>
    </div>
</div>

<div class="dashboard">

    <div class="admin-controls" id="adminControls" style="display: none;">
        <button class="admin-btn" id="openModalBtn">+ Add Game</button>
    </div>

    <div class="toolbar">
        <div class="search-bar">
            <input type="search" id="searchInput" placeholder="Search games by title">
        </div>
        <div class="sort-bar">
            <label for="sortSelect">Sort By</label>
            <select id="sortSelect">
                <option value="title-asc">Title: A-Z</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="age-asc">Age Rating</option>
            </select>
        </div>
    </div>

    <div class="platform-filter">
        <div class="platform-filter-label">Platforms</div>
        <div class="platform-options" id="platformOptions"></div>
    </div>

    <div class="game-list" id="gameList">
        <p style="text-align: center; grid-column: 1/-1;">Loading games...</p>
    </div>

</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2>Add Game</h2>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>

        <div id="modalMessage" class="message"></div>

        <form id="addGameForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Hollow Knight" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" name="year" placeholder="e.g. 2017" min="1900" max="2099" required>
                </div>
                <div class="form-group">
                    <label for="genre">Genre</label>
                    <input type="text" id="genre" name="genre" placeholder="e.g. Action RPG" required>
                </div>
            </div>
            <div class="form-row form-row-wide">
                <div class="form-group">
                    <label for="releaseDate">Release Date</label>
                    <input type="date" id="releaseDate" name="releaseDate" required>
                </div>
                <div class="form-group">
                    <label for="ageRating">Age Rating</label>
                    <input type="text" id="ageRating" name="ageRating" placeholder="e.g. T" required>
                </div>
            </div>
            <div class="form-row form-row-wide">
                <div class="form-group">
                    <label for="platforms">Platforms</label>
                    <input type="text" id="platforms" name="platforms" placeholder="e.g. PC, Switch, PS5" required>
                </div>
                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" id="price" name="price" placeholder="e.g. 29.99" min="0" step="0.01" required>
                </div>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="A short summary of the game" required></textarea>
            </div>
            <div class="form-group">
                <label for="image" id="imageLabel">Cover Image</label>
                <div class="file-drop-zone" id="dropZone">
                    <input type="file" id="image" name="image" accept="image/*" required>
                    <div class="drop-content" id="dropContent">
                        <span class="drop-icon">Game</span>
                        <span class="drop-text">Click or drag an image here</span>
                        <span class="drop-hint" id="imageHint">JPG, PNG, WebP up to 10MB</span>
                    </div>
                    <img id="imagePreview" class="image-preview" alt="Preview" style="display:none;">
                </div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Add Game</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="detailsOverlay">
    <div class="modal details-modal">
        <div class="modal-header">
            <h2>Game Details</h2>
            <button class="modal-close" id="closeDetailsBtn">&times;</button>
        </div>
        <div class="details-layout">
            <img id="detailsImage" class="details-image" alt="">
            <div class="details-content">
                <div class="details-title" id="detailsTitle"></div>
                <div class="details-meta" id="detailsMeta"></div>
                <div class="details-grid">
                    <div class="details-card">
                        <div class="details-label">Release Date</div>
                        <div class="details-value" id="detailsReleaseDate"></div>
                    </div>
                    <div class="details-card">
                        <div class="details-label">Age Rating</div>
                        <div class="details-value" id="detailsAgeRating"></div>
                    </div>
                    <div class="details-card details-card-wide">
                        <div class="details-label">Platforms</div>
                        <div class="details-value" id="detailsPlatforms"></div>
                    </div>
                    <div class="details-card">
                        <div class="details-label">Price</div>
                        <div class="details-value" id="detailsPrice"></div>
                    </div>
                </div>
                <div class="details-video" id="detailsVideoSection">
                    <div class="details-label">Trailer</div>
                    <div class="details-video-frame">
                        <iframe
                            id="detailsVideo"
                            title="Game trailer"
                            src=""
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
                <p class="details-description" id="detailsDescription"></p>
            </div>
        </div>
    </div>
</div>

<script>
const username = localStorage.getItem("username");
const role = localStorage.getItem("role");
const isAdmin = role === "admin";

const userInfo = document.getElementById("userInfo");
const adminControls = document.getElementById("adminControls");
const gameList = document.getElementById("gameList");
const searchInput = document.getElementById("searchInput");
const sortSelect = document.getElementById("sortSelect");
const platformOptions = document.getElementById("platformOptions");
let allGames = [];

if (!username) window.location.href = "/";

if (role && role !== "user") {
    userInfo.textContent = `${username} (${role})`;
} else {
    userInfo.textContent = username;
}

if (isAdmin) {
    adminControls.style.display = "block";
}

document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = "/";
});

const overlay = document.getElementById("modalOverlay");
const openBtn = document.getElementById("openModalBtn");
const closeBtn = document.getElementById("closeModalBtn");
const modalMsg = document.getElementById("modalMessage");
const addGameForm = document.getElementById("addGameForm");
const modalTitle = document.querySelector("#modalOverlay .modal-header h2");
const submitBtn = document.getElementById("submitBtn");
const imageInput = document.getElementById("image");
const imagePreview = document.getElementById("imagePreview");
const dropContent = document.getElementById("dropContent");
const dropZone = document.getElementById("dropZone");
const imageLabel = document.getElementById("imageLabel");
const imageHint = document.getElementById("imageHint");
const detailsOverlay = document.getElementById("detailsOverlay");
const closeDetailsBtn = document.getElementById("closeDetailsBtn");
const detailsImage = document.getElementById("detailsImage");
const detailsTitle = document.getElementById("detailsTitle");
const detailsMeta = document.getElementById("detailsMeta");
const detailsReleaseDate = document.getElementById("detailsReleaseDate");
const detailsAgeRating = document.getElementById("detailsAgeRating");
const detailsPlatforms = document.getElementById("detailsPlatforms");
const detailsPrice = document.getElementById("detailsPrice");
const detailsVideoSection = document.getElementById("detailsVideoSection");
const detailsVideo = document.getElementById("detailsVideo");
const detailsDescription = document.getElementById("detailsDescription");
let editingTitle = null;

openBtn?.addEventListener("click", () => {
    openCreateModal();
});

closeBtn.addEventListener("click", closeModal);
closeDetailsBtn.addEventListener("click", closeDetails);

overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeModal();
});

detailsOverlay.addEventListener("click", (e) => {
    if (e.target === detailsOverlay) closeDetails();
});

document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (detailsOverlay.classList.contains("active")) closeDetails();
    if (overlay.classList.contains("active")) closeModal();
});

function closeModal() {
    overlay.classList.remove("active");
    resetGameForm();
}

function resetGameForm() {
    editingTitle = null;
    addGameForm.reset();
    modalTitle.textContent = "Add Game";
    submitBtn.textContent = "Add Game";
    submitBtn.disabled = false;
    modalMsg.textContent = "";
    modalMsg.className = "message";
    imageInput.required = true;
    imageLabel.textContent = "Cover Image";
    imageHint.textContent = "JPG, PNG, WebP up to 10MB";
    imagePreview.removeAttribute("src");
    imagePreview.style.display = "none";
    dropContent.style.display = "flex";
}

function openCreateModal() {
    resetGameForm();
    overlay.classList.add("active");
}

function openEditModal(game) {
    resetGameForm();
    editingTitle = game.title;
    modalTitle.textContent = `Edit ${game.title}`;
    submitBtn.textContent = "Save Changes";
    imageInput.required = false;
    imageHint.textContent = "Upload a new image to replace the current cover.";

    document.getElementById("title").value = game.title || "";
    document.getElementById("year").value = game.year || "";
    document.getElementById("genre").value = game.genre || "";
    document.getElementById("releaseDate").value = game.releaseDate || "";
    document.getElementById("ageRating").value = game.ageRating || "";
    document.getElementById("platforms").value = Array.isArray(game.platforms) ? game.platforms.join(", ") : "";
    document.getElementById("price").value = Number.isFinite(Number(game.price)) ? Number(game.price) : "";
    document.getElementById("description").value = game.description || "";

    if (game.image) {
        imagePreview.src = game.image;
        imagePreview.style.display = "block";
        dropContent.style.display = "none";
    }

    overlay.classList.add("active");
}

function openDetails(game) {
    const videoUrl = toYouTubeEmbedUrl(game.video);

    detailsImage.src = game.image;
    detailsImage.alt = game.title;
    detailsTitle.textContent = game.title;
    detailsMeta.textContent = `${game.year} • ${game.genre}`;
    detailsReleaseDate.textContent = formatReleaseDate(game.releaseDate);
    detailsAgeRating.textContent = game.ageRating || "Not provided";
    detailsPlatforms.textContent = formatPlatforms(game.platforms);
    detailsPrice.textContent = formatPrice(game.price);
    detailsVideoSection.style.display = videoUrl ? "block" : "none";
    detailsVideo.src = videoUrl || "";
    detailsDescription.textContent = game.description || "No description has been added for this game yet.";
    detailsOverlay.classList.add("active");
}

function closeDetails() {
    detailsVideo.src = "";
    detailsOverlay.classList.remove("active");
}

function renderGames(games, emptyMessage = "No games found.") {
    gameList.innerHTML = "";

    if (games.length === 0) {
        gameList.innerHTML = `<p style='grid-column: 1/-1; text-align: center;'>${emptyMessage}</p>`;
        return;
    }

    games.forEach(game => gameList.appendChild(createGameCard(game)));
}

function renderPlatformFilters(games) {
    const platforms = [...new Set(
        games.flatMap(game => Array.isArray(game.platforms) ? game.platforms : [])
    )].sort((a, b) => a.localeCompare(b));

    platformOptions.innerHTML = "";

    platforms.forEach(platform => {
        const option = document.createElement("label");
        option.className = "platform-option";
        option.innerHTML = `
            <input type="checkbox" value="${platform}">
            <span>${platform}</span>
        `;
        platformOptions.appendChild(option);
    });
}

function getSelectedPlatforms() {
    return [...platformOptions.querySelectorAll("input:checked")].map(input => input.value);
}

function applyFiltersAndSort() {
    const query = searchInput.value.trim().toLowerCase();
    const selectedPlatforms = getSelectedPlatforms();

    const filteredGames = allGames.filter(game => {
        const matchesTitle = game.title.toLowerCase().includes(query);
        const gamePlatforms = Array.isArray(game.platforms) ? game.platforms : [];
        const matchesPlatform = selectedPlatforms.length === 0
            || selectedPlatforms.every(platform => gamePlatforms.includes(platform));

        return matchesTitle && matchesPlatform;
    });

    const sortedGames = [...filteredGames].sort(compareGames);

    renderGames(
        sortedGames,
        query ? `No games match "${searchInput.value.trim()}".` : "No games found."
    );
}

function compareGames(a, b) {
    switch (sortSelect.value) {
    case "price-asc":
        return normalizePrice(a.price) - normalizePrice(b.price);
    case "price-desc":
        return normalizePrice(b.price) - normalizePrice(a.price);
    case "age-asc":
        return ageRatingRank(a.ageRating) - ageRatingRank(b.ageRating)
            || a.title.localeCompare(b.title);
    case "title-asc":
    default:
        return a.title.localeCompare(b.title);
    }
}

function formatReleaseDate(value) {
    if (!value) return "Not provided";
    const date = new Date(`${value}T00:00:00`);
    if (Number.isNaN(date.getTime())) return value;
    return date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

function formatPlatforms(platforms) {
    if (Array.isArray(platforms) && platforms.length > 0) {
        return platforms.join(", ");
    }
    if (typeof platforms === "string" && platforms.trim()) {
        return platforms;
    }
    return "Not provided";
}

function formatPrice(price) {
    const amount = Number(price);
    if (Number.isNaN(amount)) return "Not provided";
    if (amount === 0) return "Free";
    return new Intl.NumberFormat(undefined, {
        style: "currency",
        currency: "USD"
    }).format(amount);
}

function normalizePrice(price) {
    const amount = Number(price);
    return Number.isNaN(amount) ? Number.POSITIVE_INFINITY : amount;
}

function ageRatingRank(value) {
    const order = {
        EC: 0,
        E: 1,
        "E10+": 2,
        T: 3,
        M: 4,
        AO: 5,
        RP: 6
    };

    return order[value] ?? 999;
}

function toYouTubeEmbedUrl(url) {
    if (!url) return "";

    try {
        const parsed = new URL(url);

        if (parsed.hostname.includes("youtu.be")) {
            const id = parsed.pathname.slice(1);
            return id ? `https://www.youtube.com/embed/${id}` : "";
        }

        if (parsed.hostname.includes("youtube.com")) {
            if (parsed.pathname === "/watch") {
                const id = parsed.searchParams.get("v");
                return id ? `https://www.youtube.com/embed/${id}` : "";
            }

            if (parsed.pathname.startsWith("/embed/")) {
                return url;
            }
        }
    } catch {
        return "";
    }

    return "";
}

imageInput.addEventListener("change", () => {
    const file = imageInput.files[0];
    if (file) {
        showPreview(file);
        return;
    }

    if (editingTitle) {
        const currentGame = allGames.find(game => game.title === editingTitle);
        if (currentGame?.image) {
            imagePreview.src = currentGame.image;
            imagePreview.style.display = "block";
            dropContent.style.display = "none";
            return;
        }
    }

    imagePreview.removeAttribute("src");
    imagePreview.style.display = "none";
    dropContent.style.display = "flex";
});

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("drag-over");
});

dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");

    const file = e.dataTransfer.files[0];

    if (file && file.type.startsWith("image/")) {
        const dt = new DataTransfer();
        dt.items.add(file);
        imageInput.files = dt.files;
        showPreview(file);
    }
});

function showPreview(file) {
    const reader = new FileReader();

    reader.onload = (e) => {
        imagePreview.src = e.target.result;
        imagePreview.style.display = "block";
        dropContent.style.display = "none";
    };

    reader.readAsDataURL(file);
}

addGameForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = editingTitle ? "Saving..." : "Adding...";

    modalMsg.textContent = "";
    modalMsg.className = "message";

    const formData = new FormData(e.target);
    const platforms = String(formData.get("platforms") || "")
        .split(",")
        .map(value => value.trim())
        .filter(Boolean);

    formData.delete("platforms");
    formData.append("platforms", JSON.stringify(platforms));

    try {
        const url = editingTitle ? `/games/${encodeURIComponent(editingTitle)}` : "/games";
        const method = editingTitle ? "PUT" : "POST";
        const res = await fetch(url, { method, body: formData });
        const data = await res.json();

        if (data.success) {
            modalMsg.textContent = editingTitle ? "Game updated successfully!" : "Game added successfully!";
            modalMsg.className = "message success";

            if (editingTitle) {
                allGames = allGames.map(game => game.title === editingTitle ? data.game : game);
            } else {
                allGames.unshift(data.game);
            }
            renderPlatformFilters(allGames);
            applyFiltersAndSort();
            setTimeout(closeModal, 1200);
        } else {
            modalMsg.textContent = data.message || `Failed to ${editingTitle ? "update" : "add"} game.`;
            modalMsg.className = "message error";
        }
    } catch (err) {
        modalMsg.textContent = "Network error. Please try again.";
        modalMsg.className = "message error";
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = editingTitle ? "Save Changes" : "Add Game";
    }
});

async function deleteGame(title, cardEl) {
    if (!confirm(`Delete "${title}"?`)) return;

    cardEl.classList.add("deleting");

    try {
        const res = await fetch(`/games/${encodeURIComponent(title)}`, { method: "DELETE" });
        const data = await res.json();

        if (data.success) {
            allGames = allGames.filter(game => game.title !== title);
            renderPlatformFilters(allGames);
            cardEl.addEventListener("transitionend", () => applyFiltersAndSort(), { once: true });
            cardEl.addEventListener("transitionend", () => cardEl.remove(), { once: true });
        } else {
            cardEl.classList.remove("deleting");
            alert(data.message || "Failed to delete game.");
        }
    } catch (err) {
        cardEl.classList.remove("deleting");
        alert("Network error. Please try again.");
    }
}

function createGameCard(game) {
    const div = document.createElement("div");
    div.className = "game";
    div.tabIndex = 0;
    div.setAttribute("role", "button");
    div.setAttribute("aria-label", `View details for ${game.title}`);

    div.innerHTML = `
        <img src="${game.image}" alt="${game.title}">
        ${isAdmin ? `<div class="game-actions"><button class="edit-btn" title="Edit game">Edit</button><button class="delete-btn" title="Delete game">X</button></div>` : ""}
        <div class="game-info">
            <div class="game-title">${game.title}</div>
            <div class="game-meta">${game.year} • ${game.genre}</div>
            <div class="game-preview-meta">
                <span>${game.ageRating || "NR"}</span>
                <span>${formatPrice(game.price)}</span>
            </div>
        </div>
    `;

    div.addEventListener("click", () => openDetails(game));
    div.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openDetails(game);
        }
    });

    if (isAdmin) {
        div.querySelector(".edit-btn")
            .addEventListener("click", (e) => {
                e.stopPropagation();
                openEditModal(game);
            });

        div.querySelector(".delete-btn")
            .addEventListener("click", (e) => {
                e.stopPropagation();
                deleteGame(game.title, div);
            });
    }

    return div;
}

async function loadGames() {
    try {
        const res = await fetch("/games");
        allGames = await res.json();
        renderPlatformFilters(allGames);
        applyFiltersAndSort();
    } catch (err) {
        gameList.innerHTML = "<p style='color: #ff6b6b; grid-column: 1/-1; text-align: center;'>Failed to load games.</p>";
    }
}

searchInput.addEventListener("input", applyFiltersAndSort);
sortSelect.addEventListener("change", applyFiltersAndSort);
platformOptions.addEventListener("change", applyFiltersAndSort);

loadGames();
</script>

</body>
</html>
